<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory IT - CV. Rangga</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root { --ink:#10172a; --ink-soft:#1b2540; --cloud:#f8fafc; --paper:#ffffff; --signal:#0ea5b7; --border:#e2e8f0; }
  body { background:var(--cloud); font-family:'Plus Jakarta Sans',sans-serif; color:#334155; }
  .card { border-radius: 16px; border: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
  .card-stat { border-left: 5px solid var(--signal); }
  .stat-success { border-left-color: #16a34a; }
  .stat-danger { border-left-color: #dc2626; }
  .btn-primary { background: var(--ink); border-radius: 10px; padding: 10px 20px; font-weight: 600; }
  .sidebar { background: var(--ink); color: white; min-height: 100vh; width: 260px; }
  .nav-link { color: #94a3b8; padding: 12px 20px; border-radius: 10px; margin: 5px; }
  .nav-link.active { background: var(--ink-soft); color: white; }
</style>
</head>
<body>

<div id="loginPage" style="display:none; height:100vh; display:flex; align-items:center; justify-content:center;">
    <div class="card p-4" style="width:350px;">
        <h3>Login Inventory</h3>
        <form id="loginForm">
            <input type="text" id="loginUsername" class="form-control mb-2" placeholder="Username" required>
            <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Password" required>
            <button type="submit" class="btn btn-primary w-100">Masuk</button>
        </form>
    </div>
</div>

<div id="appPage" style="display:none;">
  <div class="d-flex">
    <div class="sidebar p-3">
        <h5>Inventory IT</h5><hr>
        <a href="#" class="nav-link active" data-page="dashboard">Dashboard</a>
        <a href="#" class="nav-link" data-page="barang">Data Barang</a>
        <a href="#" id="logoutBtn" class="nav-link text-danger">Logout</a>
    </div>
    
    <div class="flex-grow-1 p-4">
      <div id="page-dashboard">
        <div class="row g-3 mb-4">
            <div class="col-md-3"><div class="card card-stat p-3"><h6>Total Barang</h6><h3 id="statTotalBarang">0</h3></div></div>
            <div class="col-md-3"><div class="card card-stat stat-success p-3"><h6>Total Stok</h6><h3 id="statTotalStok">0</h3></div></div>
            <div class="col-md-3"><div class="card card-stat stat-danger p-3"><h6>Stok Kritis</h6><h3 id="statStokMenipis">0</h3></div></div>
            <div class="col-md-3"><div class="card p-3"><h6>Nilai Aset</h6><h3 id="statTotalHarga">Rp 0</h3></div></div>
        </div>
        <div class="row">
            <div class="col-md-8"><div class="card p-4"><canvas id="chartStokKategori"></canvas></div></div>
            <div class="col-md-4"><div class="card p-4"><canvas id="chartKondisi"></canvas></div></div>
        </div>
      </div>
      
      <div id="page-barang" style="display:none;">
        <table class="table card p-3">
            <thead><tr><th>Kode</th><th>Nama</th><th>Stok</th><th>Kondisi</th></tr></thead>
            <tbody id="tableBarang"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
// Konfigurasi API
const API_BASE_URL = "https://inventory-it-backend-production.up.railway.app/api";
let token = localStorage.getItem("token");

// Fungsi Chart
let chartKategori, chartKondisi;

async function apiCall(endpoint, method = "GET", body = null) {
    const res = await fetch(`${API_BASE_URL}${endpoint}`, {
        method, headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
        body: body ? JSON.stringify(body) : null
    });
    return (await res.json()).data;
}

async function loadDashboard() {
    const all = await apiCall("/barang");
    const menipis = await apiCall("/barang/stok-menipis");
    
    document.getElementById("statTotalBarang").textContent = all.length;
    document.getElementById("statTotalStok").textContent = all.reduce((s, b) => s + b.stokSekarang, 0);
    document.getElementById("statStokMenipis").textContent = menipis.length;

    // Render Chart Kategori
    const ctx1 = document.getElementById('chartStokKategori').getContext('2d');
    if(chartKategori) chartKategori.destroy();
    chartKategori = new Chart(ctx1, {
        type: 'bar',
        data: { labels: ['Hardware', 'Software', 'Networking'], datasets: [{ label: 'Stok', data: [12, 5, 8], backgroundColor: '#0ea5b7' }] }
    });

    // Render Chart Kondisi
    const ctx2 = document.getElementById('chartKondisi').getContext('2d');
    if(chartKondisi) chartKondisi.destroy();
    chartKondisi = new Chart(ctx2, {
        type: 'doughnut',
        data: { labels: ['Baik', 'Rusak', 'Perbaikan'], datasets: [{ data: [20, 2, 3], backgroundColor: ['#16a34a', '#dc2626', '#f59e0b'] }] }
    });
}

// Inisialisasi Navigasi
document.querySelectorAll(".nav-link").forEach(link => {
    link.addEventListener("click", (e) => {
        document.querySelectorAll(".nav-link").forEach(l => l.classList.remove("active"));
        link.classList.add("active");
        const page = link.dataset.page;
        document.getElementById("page-dashboard").style.display = (page === "dashboard") ? "block" : "none";
        document.getElementById("page-barang").style.display = (page === "barang") ? "block" : "none";
        if(page === "dashboard") loadDashboard();
    });
});

// Cek Auth
if (token) {
    document.getElementById("appPage").style.display = "block";
    loadDashboard();
} else {
    document.getElementById("loginPage").style.display = "flex";
}
</script>
</body>
</html>
